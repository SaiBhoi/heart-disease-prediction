<!-- base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | HeartCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff4d4d, #f2ecec);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            animation: fadeIn 0.6s ease;
        }

        .auth-header {
            background: linear-gradient(135deg, #ff4d4d, #cc0000);
            padding: 2rem;
            text-align: center;
            color: white;
        }

        .auth-header h2 {
            font-weight: 600;
            margin-bottom: 0;
        }

        .auth-form {
            padding: 2rem;
        }

        .form-control {
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #ff4d4d;
            box-shadow: 0 0 12px rgba(255,77,77,0.15);
        }

        .auth-link {
            color: #ff4d4d;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .auth-link:hover {
            color: #cc0000;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff4d4d, #cc0000);
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,77,77,0.3);
        }

        .invalid-feedback {
            color: #dc3545;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #ff4d4d, #cc0000);
            padding: 1rem 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .navbar-brand {
            color: white !important;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-brand i {
            font-size: 1.5rem;
        }

        /* Footer */
        .site-footer {
            background: linear-gradient(135deg, #ff4d4d, #cc0000);
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .auth-container {
                padding: 1rem;
            }
            
            .auth-header {
                padding: 1.5rem;
            }
            
            .auth-form {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fas fa-heartbeat"></i>
                HeartCare
            </a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </div>

    <footer class="site-footer">
        <div class="container">
            <p class="mb-0">© 2023 HeartCare. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
